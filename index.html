<!DOCTYPE html>

<!-- Inline CSS: Add Styles directly in the HTML element. ex.  <h1 style="color: red;">Hello World</h1>  -->
<!-- Internal CSS: Using <style> tags within a HTML document ex.
     <style>
        h1{
         color: red;
         font-size: 24px;
        }
    </style>    -->
<!-- * MOST RECOMMEND THIS WAY * External CSS: Linking an external CSS file to the HTML Document ex. New File | styles.css | Link element: href="styles.css"   -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
